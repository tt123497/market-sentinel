<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📡 股市哨兵 · 赛道监控</title>
<style>
/* ============================================
   RESET & VARIABLES
   ============================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14; --surface:#111827; --card:#171f30;
  --border:#1e2a3f; --hover:#253550;
  --text:#e8ecf2; --sub:#959db3; --dim:#5e6980;
  --blue:#3b82f6; --green:#22c55e; --red:#ef4444;
  --amber:#f59e0b; --purple:#a855f7; --cyan:#06b6d4;
  --pink:#ec4899; --teal:#14b8a6;
  --grad1:linear-gradient(135deg,#3b82f6,#8b5cf6);
  --grad2:linear-gradient(135deg,#f43f5e,#f97316);
  --grad3:linear-gradient(135deg,#22c55e,#14b8a6);
  --radius:14px; --radius-sm:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 4px 16px rgba(0,0,0,.4);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  line-height:1.6;-webkit-font-smoothing:antialiased;
  min-height:100vh;
}

/* ============================================
   HEADER
   ============================================ */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(8,12,20,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar .brand{font-size:1.15rem;font-weight:700;letter-spacing:-.3px}
.topbar .brand em{font-style:normal;color:var(--blue)}
.topbar .live{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.7rem;font-weight:600;padding:4px 12px;
  border-radius:20px;background:rgba(34,197,94,.12);color:var(--green);
}
.topbar .live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ============================================
   NAV PILLS
   ============================================ */
.nav{
  position:sticky;top:58px;z-index:99;
  background:rgba(8,12,20,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;gap:6px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.nav-pill{
  flex:0 0 auto;padding:8px 18px;font-size:.78rem;font-weight:500;
  background:var(--surface);border:1px solid var(--border);color:var(--sub);
  border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;
  font-family:var(--font);
}
.nav-pill:hover{color:var(--text);border-color:var(--hover)}
.nav-pill.on{color:#fff;background:var(--blue);border-color:var(--blue)}

/* ============================================
   MAIN
   ============================================ */
.main{padding:16px;max-width:960px;margin:0 auto}

/* ============================================
   STAT STRIP
   ============================================ */
.stat-strip{display:flex;gap:10px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.stat-chip{
  flex:0 0 auto;min-width:100px;padding:12px 14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);text-align:center;
}
.stat-chip .val{font-size:1.4rem;font-weight:700}
.stat-chip .lbl{font-size:.65rem;color:var(--sub);margin-top:2px}

/* ============================================
   SECTION
   ============================================ */
.section{margin-bottom:18px}
.section-title{font-size:.9rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ============================================
   SECTOR CARDS (Grid)
   ============================================ */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
  cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
}
.card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow)}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
}
.card.sig-major::before{background:var(--grad2)}
.card.sig-good::before{background:var(--grad3)}
.card.sig-neutral::before{background:var(--border)}

.card .c-icon{font-size:1.5rem;margin-bottom:4px}
.card .c-name{font-size:.85rem;font-weight:600;margin-bottom:2px}
.card .c-tag{font-size:.65rem;font-weight:600;margin-bottom:6px}
.card .c-desc{font-size:.7rem;color:var(--sub);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .c-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.card .c-pill{
  font-size:.65rem;padding:3px 8px;border-radius:6px;
  background:var(--surface);border:1px solid var(--border);color:var(--sub);
  font-family:'SF Mono','Fira Code',monospace;
}
.card .c-pill.pick{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.08)}

/* ============================================
   NEWS CARDS (Briefing)
   ============================================ */
.news-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:10px;
  border-left:4px solid var(--blue);
}
.news-card .n-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.news-card .n-rank{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:800;color:#fff;flex-shrink:0;
}
.news-card .n-rank.r1{background:var(--grad2)}
.news-card .n-rank.r2{background:var(--grad1)}
.news-card .n-rank.r3{background:linear-gradient(135deg,#8b5cf6,#a855f7)}
.news-card .n-title{font-size:.9rem;font-weight:600}
.news-card .n-body{font-size:.75rem;color:var(--sub);line-height:1.6;margin-bottom:8px}
.news-card .n-pills{display:flex;flex-wrap:wrap;gap:5px}

/* ============================================
   PICK ROW
   ============================================ */
.pick-row{display:flex;flex-direction:column;gap:8px}
.pick-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);
}
.pick-item .pi-rank{
  font-size:1.1rem;font-weight:800;color:var(--blue);min-width:22px;text-align:center;
}
.pick-item .pi-info{flex:1;min-width:0}
.pick-item .pi-name{font-size:.8rem;font-weight:600}
.pick-item .pi-code{font-size:.68rem;color:var(--dim);margin-left:4px}
.pick-item .pi-reason{font-size:.7rem;color:var(--sub);margin-top:2px}
.pick-item .pi-sector{font-size:.65rem;color:var(--dim);white-space:nowrap}

/* ============================================
   CHAIN MAP
   ============================================ */
.chain-card{margin-bottom:10px}
.chain-card summary{
  font-size:.85rem;font-weight:600;padding:12px 14px;cursor:pointer;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:space-between;
  list-style:none;
}
.chain-card summary::-webkit-details-marker{display:none}
.chain-card summary::after{content:'▸';font-size:.8rem;color:var(--sub);transition:transform .2s}
.chain-card[open] summary::after{transform:rotate(90deg)}
.chain-card .chain-body{
  padding:14px;border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--radius-sm) var(--radius-sm);background:var(--card);
}
.chain-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:.75rem}
.chain-row .cr-label{
  font-weight:600;color:var(--sub);min-width:44px;font-size:.65rem;padding-top:2px;
}
.chain-row .cr-content{color:var(--text)}
.chain-row .cr-content em{font-style:normal;color:var(--blue);font-weight:600}

/* ============================================
   EVENT TABLE
   ============================================ */
.evt-list{display:flex;flex-direction:column;gap:6px}
.evt-row{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:.78rem;
}
.evt-date{font-weight:700;min-width:70px;font-size:.75rem;white-space:nowrap}
.evt-icon{font-size:1rem;min-width:22px;text-align:center}
.evt-desc{flex:1;font-size:.78rem}
.evt-sector{font-size:.65rem;color:var(--dim);white-space:nowrap}
.evt-row.big{border-left:3px solid var(--red);background:rgba(239,68,68,.04)}

/* ============================================
   STOCK TABLE
   ============================================ */
.tbl-wrap{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);margin-bottom:14px}
.tbl-wrap .tbl-title{
  font-size:.8rem;font-weight:600;padding:10px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.tbl{width:100%;border-collapse:collapse;font-size:.73rem}
.tbl th{text-align:left;color:var(--sub);font-weight:500;padding:8px 12px;border-bottom:1px solid var(--border);font-size:.65rem;text-transform:uppercase}
.tbl td{padding:8px 12px;border-bottom:1px solid rgba(30,42,63,.5)}
.tbl tbody tr:hover td{background:rgba(59,130,246,.03)}
.tbl .code{font-family:'SF Mono','Fira Code',monospace;font-size:.68rem;color:var(--dim)}
.tbl .pilot{color:var(--blue);font-size:.7rem;font-weight:600}
.tbl .seg{color:var(--sub);font-size:.68rem}

/* ============================================
   UPDATE BAR
   ============================================ */
.update-bar{
  text-align:center;padding:8px;font-size:.68rem;color:var(--sub);
  background:var(--surface);border-bottom:1px solid var(--border);
}

/* ============================================
   FOOTER
   ============================================ */
.footer{
  text-align:center;padding:24px;color:var(--dim);font-size:.65rem;
  border-top:1px solid var(--border);margin-top:20px;line-height:1.8;
}

/* ============================================
   MOBILE
   ============================================ */
@media(max-width:600px){
  .topbar{padding:10px 14px}
  .topbar .brand{font-size:1rem}
  .nav{padding:6px 8px;gap:4px}
  .nav-pill{padding:7px 14px;font-size:.72rem}
  .main{padding:10px}
  .card-grid{grid-template-columns:1fr}
  .stat-strip{gap:6px}
  .stat-chip{min-width:80px;padding:10px}
  .stat-chip .val{font-size:1.1rem}
  .evt-date{min-width:60px;font-size:.7rem}
}

.tab-panel{display:none}
.tab-panel.on{display:block}
</style>

  events:[

    {d:"7月上旬",icon:"🤖",e:"宇树科技科创板挂牌",s:"人形机器人",big:0,desc:"人形机器人第一股"},
    {d:"7月中旬",icon:"📊",e:"半年报业绩预告密集发布",s:"全部赛道",big:1,desc:"Q2涨价受益标的业绩兑现"},
    {d:"8月",icon:"📊",e:"半年报正式密集披露",s:"全部赛道",big:1,desc:"业绩验证，决定这波行情能走多远"},

// ==========================================
// TAB SWITCH
// ==========================================
const TABS=['overview','briefing','chain','calendar','stocks'];
const TLABEL={overview:'📊 总览',briefing:'📰 今日简报',chain:'🗺️ 产业链',calendar:'📅 事件日历',stocks:'🎯 标的清单'};

function go(tab){
  document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('pill-'+tab).classList.add('on');
  document.getElementById('panel-'+tab).classList.add('on');
}

// ==========================================
// RENDER
// ==========================================
(function build(){
  // Update bar
  document.getElementById('updateBar').innerHTML=
    `⏰ 最后更新：<b>${D.updated}</b> &nbsp;|&nbsp; 📡 下个哨兵：${D.next}`;

  // Nav
  document.getElementById('navBar').innerHTML=TABS.map((t,i)=>
    `<div class="nav-pill${i===0?' on':''}" id="pill-${t}" onclick="go('${t}')">${TLABEL[t]}</div>`
  ).join('');

  // ════ PANEL: OVERVIEW ════
  let ov=`
    <div class="tab-panel on" id="panel-overview">
      <div class="stat-strip">
        <div class="stat-chip"><div class="val" style="color:var(--red)">9</div><div class="lbl">赛道监控中</div></div>
        <div class="stat-chip"><div class="val" style="color:var(--amber)">3</div><div class="lbl">🔥 重大信号</div></div>
        <div class="stat-chip"><div class="val" style="color:var(--green)">3</div><div class="lbl">🟢 利好</div></div>
        <div class="stat-chip"><div class="val" style="color:var(--sub)">3</div><div class="lbl">🟡 中性</div></div>
      </div>
      <div class="section">
        <div class="section-title">🔥 9个赛道 · 一眼看全局</div>
        <div class="card-grid">`;

  D.sectors.forEach(s=>{
    ov+=`
      <div class="card sig-${s.sig}" onclick="go('chain')">
        <div class="c-icon">${s.icon}</div>
        <div class="c-name">${s.n}</div>
        <div class="c-tag" style="color:${s.sig==='major'?'var(--red)':s.sig==='good'?'var(--green)':'var(--sub)'}">${s.tag.split('|')[0]}</div>
        <div class="c-desc">${s.d}</div>
        <div class="c-pills">${s.st.map(x=>`<span class="c-pill${x.pick?' pick':''}">${x.c} ${x.n}</span>`).join('')}</div>
      </div>`;
  });

  ov+=`</div></div></div>`;

  // ════ PANEL: BRIEFING ════
  let br=`<div class="tab-panel" id="panel-briefing">
    <div class="section">
      <div class="section-title">📰 今日最重要的3条消息</div>`;

  D.top3.forEach(n=>{
    br+=`
      <div class="news-card">
        <div class="n-head">
          <div class="n-rank r${n.r}">${n.r}</div>
          <div class="n-title">${n.t}</div>
        </div>
        <div class="n-body">${n.b}</div>
        <div class="n-pills">${n.s.map(x=>`<span class="c-pill pick">${x}</span>`).join('')}</div>
      </div>`;
  });

  br+=`</div>
    <div class="section">
      <div class="section-title">🎯 今日重点跟踪 Top 5</div>
      <div class="pick-row">`;

  D.picks.forEach(p=>{
    br+=`
      <div class="pick-item">
        <div class="pi-rank">#${p.r}</div>
        <div class="pi-info">
          <div><span class="pi-name">${p.n}</span><span class="pi-code">${p.c}</span></div>
          <div class="pi-reason">${p.why}</div>
        </div>
        <div class="pi-sector">${p.sec}</div>
      </div>`;
  });

  br+=`</div></div></div>`;

  // ════ PANEL: CHAIN ════
  let ch=`<div class="tab-panel" id="panel-chain">
    <div class="section">
      <div class="section-title">🗺️ 产业链穿透图（点击展开）</div>
      <p style="font-size:.7rem;color:var(--sub);margin-bottom:12px">任何赛道出消息 → 打开这张图 → 30秒锁定所有受益标的。🔥 = 当前重点推荐</p>`;

  D.sectors.forEach(s=>{
    ch+=`
      <details class="chain-card" id="chain-${s.id}">
        <summary>
          <span>${s.icon} ${s.n} &nbsp;<span style="color:${s.sig==='major'?'var(--red)':s.sig==='good'?'var(--green)':'var(--sub)'};font-size:.7rem">${s.tag.split('|')[0]}</span></span>
        </summary>
        <div class="chain-body">
          <div class="chain-row"><span class="cr-label">⬆ 上游</span><span class="cr-content">${s.ch.up}</span></div>
          <div class="chain-row"><span class="cr-label">🔷 中游</span><span class="cr-content">${s.ch.mid}</span></div>
          <div class="chain-row"><span class="cr-label">⬇ 下游</span><span class="cr-content">${s.ch.down}</span></div>
          <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px">
            ${s.st.map(x=>`<span class="c-pill${x.pick?' pick':''}">${x.c} ${x.n}${x.pick?' ★':''}</span>`).join('')}
          </div>
          <div style="margin-top:8px;font-size:.68rem;color:var(--sub)">⏰ ${s.ev}</div>
        </div>
      </details>`;
  });

  ch+=`</div></div>`;

  // ════ PANEL: CALENDAR ════
  let ca=`<div class="tab-panel" id="panel-calendar">
    <div class="section">
      <div class="section-title">📅 预判事件日历 · 6~8月</div>
      <p style="font-size:.72rem;color:var(--sub);margin-bottom:12px">
        💡 大部分"突发新闻"其实有固定时间表。知道接下来要发生什么，你就能提前布局，而不是等消息出来再追高。
      </p>
      <div class="evt-list">`;

  D.events.forEach(e=>{
    ca+=`
      <div class="evt-row${e.big?' big':''}">
        <span class="evt-date">${e.d}</span>
        <span class="evt-icon">${e.icon}</span>
        <span class="evt-desc">${e.e}${e.big?' <b style="color:var(--red);font-size:.7rem">⚡关键</b>':''}</span>
        <span class="evt-sector">${e.s}</span>
      </div>`;
  });

  ca+=`</div></div></div>`;

  // ════ PANEL: STOCKS ════
  let st=`<div class="tab-panel" id="panel-stocks">
    <div class="section">
      <div class="section-title">🎯 全赛道标的清单</div>
      <p style="font-size:.72rem;color:var(--sub);margin-bottom:12px">★ 重点 = 当前最值得关注 | 点击产业链页看上下游关系</p>`;

  D.sectors.forEach(s=>{
    st+=`
      <div class="tbl-wrap">
        <div class="tbl-title">${s.icon} ${s.n}</div>
        <table class="tbl">
          <thead><tr><th>代码</th><th>名称</th><th>位置</th><th>关注</th></tr></thead>
          <tbody>`;

    const allText=s.ch.up+s.ch.mid+s.ch.down;
    s.st.forEach(x=>{
      let seg='';
      if(allText.includes(x.n)){seg=s.ch.up.includes(x.n)?'上游':s.ch.mid.includes(x.n)?'中游':'下游'}
      st+=`<tr>
        <td class="code">${x.c}</td><td>${x.n}</td>
        <td class="seg">${seg||'—'}</td>
        <td class="pilot">${x.pick?'★ 重点':'—'}</td>
      </tr>`;
    });

    st+=`</tbody></table></div>`;
  });

  st+=`</div></div>`;

  // Combine all
  document.getElementById('mainContent').innerHTML=ov+br+ch+ca+st;
})();
</script>
</body>
</html>
