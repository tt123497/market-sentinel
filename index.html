<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📡 LIVE · 股市哨兵</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14; --surface:#111827; --card:#171f30;
  --border:#1e2a3f; --hover:#253550;
  --text:#e8ecf2; --sub:#959db3; --dim:#5e6980;
  --blue:#3b82f6; --green:#22c55e; --red:#ef4444;
  --amber:#f59e0b; --purple:#a855f7; --cyan:#06b6d4;
  --pink:#ec4899; --teal:#14b8a6;
  --grad1:linear-gradient(135deg,#3b82f6,#8b5cf6);
  --grad2:linear-gradient(135deg,#f43f5e,#f97316);
  --grad3:linear-gradient(135deg,#22c55e,#14b8a6);
  --radius:14px; --radius-sm:8px;
  --shadow:0 4px 16px rgba(0,0,0,.4);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
}
html{font-size:18px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}

.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(8,12,20,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar .brand{font-size:1.3rem;font-weight:700;letter-spacing:-.3px}
.topbar .brand em{font-style:normal;color:var(--blue)}
.topbar .live{display:inline-flex;align-items:center;gap:5px;font-size:.84rem;font-weight:600;padding:4px 12px;border-radius:20px;background:rgba(34,197,94,.12);color:var(--green)}
.topbar .live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.nav{
  position:sticky;top:58px;z-index:99;
  background:rgba(8,12,20,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;gap:6px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.nav-pill{
  flex:0 0 auto;padding:8px 18px;font-size:.93rem;font-weight:500;
  background:var(--surface);border:1px solid var(--border);color:var(--sub);
  border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;
  font-family:var(--font);
}
.nav-pill:hover{color:var(--text);border-color:var(--blue);transform:translateY(-1px)}
.nav-pill.on{color:#fff;background:var(--blue);border-color:var(--blue)}

.main{padding:16px;max-width:1100px;margin:0 auto}
.section{margin-bottom:18px}
.section-title{font-size:1.08rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.group-hd{font-size:.93rem;font-weight:700;color:var(--blue);margin:16px 0 8px;padding:6px 0;border-bottom:1px dashed var(--border);display:flex;align-items:center;gap:6px}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
  cursor:pointer;transition:all .2s;box-shadow:0 1px 2px rgba(0,0,0,.3);
  position:relative;overflow:hidden;
}
.card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.sig-major::before{background:var(--grad2)}
.card.sig-good::before{background:var(--grad3)}
.card.sig-neutral::before{background:var(--border)}
.card .c-icon{font-size:1.7rem;margin-bottom:4px}
.card .c-name{font-size:1.02rem;font-weight:600;margin-bottom:2px}
.card .c-tag{font-size:.93rem;font-weight:600;margin-bottom:6px}
.card .c-desc{font-size:.84rem;color:var(--sub);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .c-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.c-pill{font-size:.93rem;padding:3px 8px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--sub);font-family:'SF Mono','Fira Code',monospace;cursor:pointer;transition:all .15s}
.c-pill:hover{border-color:var(--blue);color:var(--text);transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.3)}
.c-pill.pick{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.08)}
.stock-search{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.stock-search input{flex:1;padding:10px 14px;font-size:.9rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'SF Mono','Fira Code',monospace;outline:none}
.stock-search input:focus{border-color:var(--blue)}
.stock-search button{padding:10px 18px;font-size:.86rem;font-weight:600;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap}
.stock-search button:hover{opacity:.9}
.stock-result{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px;display:none}
.stock-result .sr-row{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.stock-result .sr-name{font-size:1rem;font-weight:600}
.stock-result .sr-code{font-size:.78rem;color:var(--dim);font-family:'SF Mono','Fira Code',monospace}
.stock-result .sr-price{font-size:1.3rem;font-weight:800}
.stock-result .sr-chg{font-size:.9rem;font-weight:600}
.stock-result .sr-meta{font-size:.72rem;color:var(--sub)}


.news-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;border-left:4px solid var(--blue);transition:all .15s}
.news-card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.3);border-color:var(--blue)}
.news-card .n-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.news-card .n-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.02rem;font-weight:800;color:#fff;flex-shrink:0}
.news-card .n-rank.r1{background:var(--grad2)}
.news-card .n-rank.r2{background:var(--grad1)}
.news-card .n-rank.r3{background:linear-gradient(135deg,#8b5cf6,#a855f7)}
.news-card .n-rank.r4{background:linear-gradient(135deg,#06b6d4,#3b82f6)}
.news-card .n-rank.r5{background:linear-gradient(135deg,#14b8a6,#06b6d4)}
.news-card .n-rank.r6{background:linear-gradient(135deg,#f59e0b,#f97316)}
.news-card .n-rank.r7{background:linear-gradient(135deg,#ec4899,#f43f5e)}
.news-card .n-rank.r8{background:linear-gradient(135deg,#a855f7,#ec4899)}
.news-card .n-rank.r9{background:linear-gradient(135deg,#6366f1,#a855f7)}
.news-card .n-rank.r10{background:linear-gradient(135deg,#475569,#6366f1)}
.news-card .n-title{font-size:1.08rem;font-weight:600}
.news-card .n-title a{color:var(--text);text-decoration:none}
.news-card .n-title a:hover{color:var(--blue);text-decoration:underline}
.news-card .n-link{display:inline-block;margin-top:6px;font-size:.72rem;color:var(--blue);text-decoration:none}
.news-card .n-link:hover,.c-msg a:hover,.evt-desc a:hover,.pi-reason a:hover{text-decoration:underline}
.news-card .n-body{font-size:1.08rem;color:var(--sub);line-height:1.6;margin-bottom:8px}
.news-card .n-pills{display:flex;flex-wrap:wrap;gap:5px}

.pick-row{display:flex;flex-direction:column;gap:8px}
.pick-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}
.pick-item:hover{background:var(--card);border-color:var(--blue);transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.3)}
.pick-item .pi-rank{font-size:1.25rem;font-weight:800;color:var(--blue);min-width:22px;text-align:center}
.pick-item .pi-info{flex:1;min-width:0}
.pick-item .pi-name{font-size:.96rem;font-weight:600}
.pick-item .pi-code{font-size:.82rem;color:var(--dim);margin-left:4px}
.pick-item .pi-reason{font-size:.84rem;color:var(--sub);margin-top:2px}
.pick-item .pi-sector{font-size:.93rem;color:var(--dim);white-space:nowrap}
.pick-item .pi-arrow{font-size:.72rem;color:var(--dim);transition:transform .2s;min-width:16px;text-align:center}
.pick-item.collapsed .pi-reason{display:none}
.pick-item.collapsed .pi-arrow{transform:rotate(-90deg)}

.chain-card{margin-bottom:10px}
.chain-card summary{font-size:1.02rem;font-weight:600;padding:12px 14px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:space-between;list-style:none;transition:all .15s}
.chain-card summary:hover{background:var(--card);transform:translateY(-1px);border-color:var(--blue)}
.chain-card summary::-webkit-details-marker{display:none}
.chain-card summary::after{content:'▸';font-size:.96rem;color:var(--sub);transition:transform .2s}
.chain-card[open] summary::after{transform:rotate(90deg)}
.chain-card .chain-body{padding:14px;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);background:var(--card)}
.chain-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:1.08rem}
.chain-row .cr-label{font-weight:600;color:var(--sub);min-width:44px;font-size:.93rem;padding-top:2px}
.chain-row .cr-content{color:var(--text)}
.chain-row .cr-content em{font-style:normal;color:var(--blue);font-weight:600}

.evt-list{display:flex;flex-direction:column;gap:6px}
.evt-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.93rem;transition:all .15s;cursor:pointer}
.evt-row:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.3);border-color:var(--blue)}
.evt-date{font-weight:700;min-width:70px;font-size:1.08rem;white-space:nowrap}
.evt-icon{font-size:1rem;min-width:22px;text-align:center}
.evt-desc{flex:1;font-size:.93rem}
.evt-sector{font-size:.93rem;color:var(--dim);white-space:nowrap}
.evt-row.big{border-left:3px solid var(--red);background:rgba(239,68,68,.04)}
.layout-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;transition:all .15s}
.layout-card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.3);border-color:var(--blue)}
.layout-card.urgent{border-left:3px solid var(--red);background:rgba(239,68,68,.04)}
.layout-card.hot{border-left:3px solid var(--amber)}
.layout-card.warm{border-left:3px solid var(--blue)}
.layout-card.normal{border-left:3px solid var(--border)}
.layout-card.past{opacity:.45;border-left:3px solid var(--dim)}
.layout-card .lc-countdown{min-width:72px;text-align:center}
.layout-card .lc-countdown .lc-days{font-size:1.6rem;font-weight:800}
.layout-card .lc-countdown .lc-label{font-size:.68rem;color:var(--dim)}
.layout-card .lc-info{flex:1;min-width:0}
.layout-card .lc-title{font-size:.9rem;font-weight:600;margin-bottom:3px}
.layout-card .lc-sector{font-size:.72rem;color:var(--dim);margin-bottom:4px}
.layout-card .lc-lead{font-size:.7rem;color:var(--blue);margin-bottom:6px}
.layout-card .lc-stocks{display:flex;flex-wrap:wrap;gap:5px}

.evt-row.past{opacity:.45}
.evt-row.past .evt-date{color:var(--dim)}

.tbl-wrap{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);margin-bottom:14px}
.tbl-wrap .tbl-title{font-size:.96rem;font-weight:600;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;list-style:none;display:flex;align-items:center;user-select:none;transition:all .15s}
.tbl-wrap .tbl-title:hover{background:var(--card)}
.tbl-wrap .tbl-title::-webkit-details-marker{display:none}
.tbl{width:100%;border-collapse:collapse;font-size:.88rem}
.tbl th{text-align:left;color:var(--sub);font-weight:500;padding:8px 12px;border-bottom:1px solid var(--border);font-size:.93rem;text-transform:uppercase}
.tbl td{padding:8px 12px;border-bottom:1px solid rgba(30,42,63,.5)}
.tbl tbody tr{cursor:pointer;transition:all .1s}
.tbl tbody tr:hover td{background:rgba(59,130,246,.03);transform:translateY(-1px)}
.tbl .code{font-family:'SF Mono','Fira Code',monospace;font-size:.82rem;color:var(--dim)}
.tbl .pilot{color:var(--blue);font-size:.84rem;font-weight:600}
.tbl .up{color:var(--green)} .tbl .down{color:var(--red)}

/* Market Recap */
.recap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.recap-chip{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;transition:all .15s}
.recap-chip:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.3);border-color:var(--blue)}
.recap-chip .rc-val{font-size:1.8rem;font-weight:800}
.recap-chip .rc-label{font-size:.93rem;color:var(--sub);margin-top:4px}
.recap-chip .rc-sub{font-size:.86rem;color:var(--dim);margin-top:2px}

.recap-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:8px 0}
.recap-bar div{height:100%}

.heat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.heat-tag{padding:4px 12px;border-radius:12px;font-size:.84rem;font-weight:600;transition:all .15s;border:1px solid transparent}
.heat-tag:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.3);border-color:var(--blue)}

/* ── Market Cycle Card ── */
.cycle-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;border-left:4px solid var(--blue);transition:all .2s}
.cycle-card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.35);border-color:var(--blue)}
.cycle-card.risk-low{border-left-color:var(--green)}
.cycle-card.risk-medium{border-left-color:var(--amber)}
.cycle-card.risk-high{border-left-color:var(--red)}
.cycle-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.cycle-phase{font-size:1.1rem;font-weight:700}
.cycle-risk-tag{font-size:.78rem;font-weight:600;padding:3px 10px;border-radius:10px}
.cycle-risk-tag.low{background:rgba(34,197,94,.12);color:var(--green)}
.cycle-risk-tag.medium{background:rgba(245,158,11,.12);color:var(--amber)}
.cycle-risk-tag.high{background:rgba(239,68,68,.12);color:var(--red)}
.cycle-signals{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.cycle-signal{font-size:.82rem;color:var(--sub);padding:2px 0 2px 10px;border-left:2px solid var(--border)}
.cycle-suggestion{font-size:.86rem;font-weight:600;padding:8px 12px;background:rgba(59,130,246,.06);border-radius:var(--radius-sm);color:var(--blue)}

/* ── ZT Ladder ── */
.zt-ladder-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.zt-tier{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:all .15s}
.zt-tier:hover{border-color:var(--blue)}
.zt-tier-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(59,130,246,.04);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:all .15s}
.zt-tier-header:hover{background:rgba(59,130,246,.08);transform:translateY(-1px);border-color:var(--blue)}
.zt-tier-header .arr{font-size:.72rem;color:var(--sub);transition:transform .2s;margin-left:auto}
.zt-tier.collapsed .zt-tier-body{display:none}
.zt-tier.collapsed .zt-tier-header{border-bottom:none}
.zt-tier.collapsed .zt-tier-header .arr{transform:rotate(-90deg)}
.zt-tier-badge{font-size:.93rem;font-weight:800;padding:3px 10px;border-radius:5px;color:#fff;min-width:56px;text-align:center}
.zt-tier-badge.b6,.zt-tier-badge.b5{background:linear-gradient(135deg,#ef4444,#f97316)}
.zt-tier-badge.b4,.zt-tier-badge.b3{background:linear-gradient(135deg,#f59e0b,#eab308)}
.zt-tier-badge.b2{background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
.zt-tier-badge.b1{background:linear-gradient(135deg,#6366f1,#a855f7)}
.zt-tier-count{font-size:.78rem;color:var(--sub)}
.zt-tier-body{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px}
.zt-stock{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:.78rem;transition:all .15s;cursor:pointer}
.zt-stock:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.3)}
.zt-stock .sc{font-family:'SF Mono','Fira Code',monospace;color:var(--dim);font-size:.74rem}
.zt-stock .si{font-size:.68rem;color:var(--sub);margin-left:2px;max-width:60px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.zt-none{text-align:center;color:var(--dim);padding:16px;font-size:.86rem}

/* ── Stock Hover Tip ── */
.stock-tip{position:fixed;z-index:9999;background:var(--card);border:1px solid var(--blue);border-radius:var(--radius-sm);padding:10px 13px;font-size:.82rem;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.5);min-width:170px;max-width:240px}
.stock-tip .st-name{font-size:.96rem;font-weight:700;margin-bottom:4px}
.stock-tip .st-code{font-size:.74rem;color:var(--dim);font-family:'SF Mono','Fira Code',monospace}
.stock-tip .st-price{font-size:1.15rem;font-weight:700;margin:4px 0}
.stock-tip .st-sector{font-size:.78rem;color:var(--blue);margin-top:2px}
.stock-tip .st-chain{font-size:.72rem;color:var(--sub);margin-top:2px}

/* ── Recap Date Switcher ── */
.recap-date-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.recap-date-bar input[type="date"]{padding:5px 8px;font-size:.8rem;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font)}
.recap-date-bar input[type="date"]:focus{border-color:var(--blue);outline:none}
.recap-date-bar input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1)}
.recap-date-bar .btn-today{padding:5px 12px;font-size:.78rem;font-weight:600;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer}
.recap-date-bar .btn-today:hover{opacity:.9}
.recap-date-bar .date-status{font-size:.74rem;color:var(--dim)}

.update-bar{text-align:center;padding:8px;font-size:.82rem;color:var(--sub);background:var(--surface);border-bottom:1px solid var(--border)}
.footer{text-align:center;padding:24px;color:var(--dim);font-size:.93rem;border-top:1px solid var(--border);margin-top:20px;line-height:1.8}
.stat-strip{display:flex;gap:10px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.stat-chip{flex:0 0 auto;min-width:80px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;transition:all .15s}
.stat-chip:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.3);border-color:var(--blue)}
.stat-chip .val{font-size:1.4rem;font-weight:700}
.stat-chip .lbl{font-size:.93rem;color:var(--sub);margin-top:2px}

@media(max-width:600px){
  .topbar{padding:10px 14px}.topbar .brand{font-size:1rem}
  .nav{padding:6px 8px;gap:4px}.nav-pill{padding:7px 14px;font-size:.86rem}
  .main{padding:10px}.card-grid{grid-template-columns:1fr}
  .recap-grid{grid-template-columns:repeat(3,1fr)}
  .stat-chip{min-width:70px;padding:10px}.stat-chip .val{font-size:1.25rem}
  .zt-tier-body{gap:3px}.zt-stock{font-size:.72rem;padding:3px 6px}
  .zt-tier-badge{font-size:.84rem;padding:2px 8px;min-width:48px}
}
.tab-panel{display:none}
.tab-panel.on{display:block}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">📡 <em>股市哨兵</em> · 全市场赛道监控</div>
  <div class="live">实时</div>
</div>
<div class="update-bar" id="updateBar">数据更新中...</div>
<div class="nav" id="navBar"></div>
<div class="main" id="mainContent"></div>
<div class="stock-tip" id="stockTip" style="display:none"></div>
<div class="footer">⚠️ 本页面仅供研究参考，不构成任何投资建议。投资有风险，入市须谨慎。</div>

<script>

const TABS=['overview','layout','recap','briefing','chain','calendar','stocks'];
const TLABEL={overview:'📊 总览',layout:'📋 布局',recap:'📈 复盘',briefing:'📰 简报',chain:'🗺️ 产业链',calendar:'📅 事件',stocks:'🎯 标的'};

function go(tab){
  document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('pill-'+tab).classList.add('on');
  document.getElementById('panel-'+tab).classList.add('on');
}

(function build(){
  document.getElementById('navBar').innerHTML=TABS.map((t,i)=>`<div class="nav-pill${i===0?' on':''}" id="pill-${t}" onclick="go('${t}')">${TLABEL[t]}</div>`).join('');

  // Fetch data.json first, merge into D, THEN render all panels
  fetch('./data.json?t='+Date.now()).then(function(r){return r.json()}).then(function(data){
    if(data.recap){
      if(data.recap.index&&data.recap.index.length) D.recap.index=data.recap.index;
      if(data.recap.heat&&data.recap.heat.length) D.recap.heat=data.recap.heat;
      if(data.recap.winners&&data.recap.winners.length) D.recap.winners=data.recap.winners;
      if(data.recap.losers&&data.recap.losers.length) D.recap.losers=data.recap.losers;
      if(data.recap.note) D.recap.note=data.recap.note;
      if(data.recap.flow) D.recap.flow=data.recap.flow;
      if(data.recap.cycle) D.recap.cycle=data.recap.cycle;
      if(data.recap.ztLadder) D.recap.ztLadder=data.recap.ztLadder;
      if(data.concepts){Object.keys(data.concepts).forEach(function(c){if(stockInfo[c])stockInfo[c].concepts=data.concepts[c];});}
    }
    // Dynamic sectors: append new hot sectors found at noon
    if(data.dynamicSectors&&data.dynamicSectors.length){
      D.groups.push({n:'🔥 每日热门 · '+data.dynamicSectors[0].date, sectors:data.dynamicSectors});
      // Enrich stockInfo
      data.dynamicSectors.forEach(function(s){
        s.st.forEach(function(st){stockInfo[st.c]=stockInfo[st.c]||{name:st.n, sector:s.n, pos:'板块成分', tag:s.tag, ind:'新晋热门'};});
      });
    }
    if(data.top3&&data.top3.length) D.top3=data.top3;
    if(data.picks&&data.picks.length) D.picks=data.picks;
    if(data.events&&data.events.length) D.events=data.events;
    if(data.layout&&data.layout.length) D.layout=data.layout;
    if(data.updated) D.updated=data.updated;
    if(data.nextSentinel) D.next=data.nextSentinel;
    if(data.livePrices) D.livePrices=data.livePrices;
    if(data.bHistory&&data.bHistory.length) D.bHistory=data.bHistory;
    // Map Claude sectors -> D.groups sig/msg/u values
    if(data.sectors){
      var secMap={};
      data.sectors.forEach(function(s){ secMap[s.name]={sig:s.sig,msg:s.msg||'',u:s.u||''}; });
      D.groups.forEach(function(g){
        g.sectors.forEach(function(s){
          for(var k in secMap){
            if(s.n.indexOf(k)>=0||k.indexOf(s.n)>=0){ s.sig=secMap[k].sig; s.msg=secMap[k].msg; s.u=secMap[k].u; break; }
          }
        });
      });
    }
    renderAll();
  }).catch(function(){ renderAll(); });

  // Helper: compute real countdown days from today to event date (mirrors calendar logic)
  function realDays(ds){
    var today=new Date(); today.setHours(0,0,0,0);
    var m=/(\d+)月(\d+)/.exec(ds);
    if(m) return Math.ceil((new Date(2026,parseInt(m[1])-1,parseInt(m[2]))-today)/86400000);
    if(/上旬/.test(ds)){ var m2=/(\d+)月/.exec(ds); if(m2) return Math.ceil((new Date(2026,parseInt(m2[1])-1,5)-today)/86400000); }
    if(/中旬/.test(ds)){ var m3=/(\d+)月/.exec(ds); if(m3) return Math.ceil((new Date(2026,parseInt(m3[1])-1,15)-today)/86400000); }
    if(/下旬/.test(ds)){ var m4=/(\d+)月/.exec(ds); if(m4) return Math.ceil((new Date(2026,parseInt(m4[1])-1,25)-today)/86400000); }
    return 999;
  }

    '培育钻石/散热':'新材料','超导/核聚变':'电力设备','碳纤维':'化工','人形机器人':'机械设备',
    '商业航天':'国防军工','6G/通信':'通信设备','固态电池':'电池','低空经济eVTOL':'航空装备',
    '空间计算/物理AI':'IT服务','钨稀土':'有色金属'};
  D.groups.forEach(function(g){
    g.sectors.forEach(function(s){
      s.st.forEach(function(st){
        var pos=''; if(s.ch.up.indexOf(st.n)>=0) pos='⬆上游'; else if(s.ch.mid.indexOf(st.n)>=0) pos='🔷中游'; else if(s.ch.down.indexOf(st.n)>=0) pos='⬇下游';
        stockInfo[st.c]={name:st.n, sector:s.n, group:g.n.replace(/[^一-鿿]/g,''), pos:pos||'—', tag:s.tag.split('|')[0], ind:secInd[s.n]||s.n};

  if(D.recap.ztLadder&&D.recap.ztLadder.tiers){
    D.recap.ztLadder.tiers.forEach(function(t){

  D.groups.forEach(g=>{
    ov+=`<div class="group-hd">${g.n}</div><div class="card-grid">`;

        <div class="c-desc">${s.d}</div>
        ${s.msg?`<div class="c-msg" style="font-size:.76rem;color:var(--sub);margin:4px 0;line-height:1.5">${s.u?'<a href="'+s.u+'" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none">📰 '+s.msg+'</a>':s.msg}</div>`:''}
        <div class="c-pills">${s.st.map(x=>`<span class="c-pill${x.pick?' pick':''}">${x.c} ${x.n}</span>`).join('')}</div>
      </div>`;
    });
    ov+=`</div>`;
  });

    var info=stockInfo[code]; if(!info) return;
    var lp=(D.livePrices||{})['sh'+code]||(D.livePrices||{})['sz'+code];
    var ph=''; if(lp){var cl=lp.chg_pct>=0?'var(--red)':'var(--green)';var ar=lp.chg_pct>=0?'+':'';ph='<div class="st-price" style="color:'+cl+'">'+Number(lp.price).toFixed(2)+' <span style="font-size:.78rem">'+ar+Number(lp.chg_pct).toFixed(1)+'%</span></div>';}
    var ind=info.ztInd||info.ind||'—';
    var cx=info.concepts&&info.concepts.length?info.concepts.slice(0,5).join(' · '):'—';
    tipEl.innerHTML='<div class="st-name">'+info.name+'</div><div class="st-code">'+code+'</div>'+ph+'<div style="font-size:.76rem;margin-top:4px"><span style="color:var(--dim)">行业</span> '+ind+'</div><div style="font-size:.76rem;margin-top:2px;line-height:1.5"><span style="color:var(--dim)">概念</span> <span style="color:var(--blue)">'+cx+'</span></div><div style="font-size:.7rem;color:var(--sub);margin-top:3px">'+info.pos+' | '+info.group+' · '+info.tag+'</div>';
    tipEl.style.display='block';
    tipTimer=setTimeout(function(){var x=e.clientX+15,y=e.clientY-10;if(x+240>window.innerWidth)x=e.clientX-250;if(y+120>window.innerHeight)y=e.clientY-130;tipEl.style.left=x+'px';tipEl.style.top=y+'px';},80);
  });
  document.getElementById('mainContent').addEventListener('mouseout',function(e){
    var el=e.target; while(el&&el!==this){if(el.classList.contains('c-pill')||el.classList.contains('zt-stock')||el.closest('tr')){tipCode='';tipEl.style.display='none';return;}el=el.parentElement;}
  });

  // Final updateBar refresh from data.json
  fetch('./data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
    if(d.updated){document.getElementById('updateBar').innerHTML=`📡 <b>${d.updated}</b> | ${d.nextSentinel||'等待下次扫描'} | 交易日每5分钟自动刷新`;}
  }).catch(()=>{});
})();
</script>
</body>
</html>
