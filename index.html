<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📡 LIVE · 股市哨兵</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a10; --surface:#0f1625; --card:#182032;
  --border:#1e2f4a; --border-light:#253b58;
  --text:#e8ecf2; --sub:#959db3; --dim:#5e6980;
  --blue:#3b82f6; --green:#22c55e; --red:#ef4444;
  --amber:#f59e0b; --purple:#a855f7; --cyan:#06b6d4;
  --grad1:linear-gradient(135deg,#3b82f6,#8b5cf6);
  --grad2:linear-gradient(135deg,#f43f5e,#f97316);
  --grad3:linear-gradient(135deg,#22c55e,#14b8a6);
  --radius:16px; --radius-sm:10px;
  --shadow:0 4px 20px rgba(0,0,0,.35);
  --shadow-lg:0 8px 30px rgba(0,0,0,.45);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
}
html{font-size:18px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── Top Bar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(6,10,16,.93);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar .brand{font-size:1.2rem;font-weight:700;letter-spacing:-.3px}
.topbar .brand em{font-style:normal;color:var(--blue)}
.topbar .live{display:inline-flex;align-items:center;gap:5px;font-size:.82rem;font-weight:600;padding:4px 12px;border-radius:20px;background:rgba(34,197,94,.12);color:var(--green)}
.topbar .live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes chain-pop{0%,100%{box-shadow:0 0 0 rgba(59,130,246,0)}50%{box-shadow:0 0 28px rgba(59,130,246,.5)}}
.chain-card.flash{animation:chain-pop .7s ease-in-out 2;border-color:var(--blue) !important}

/* ── Navigation ── */
.nav{
  position:sticky;top:46px;z-index:99;
  background:rgba(6,10,16,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:10px 18px;display:flex;gap:10px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.nav-pill{
  flex:0 0 auto;padding:9px 20px;font-size:.95rem;font-weight:600;
  background:var(--surface);border:1px solid var(--border);color:var(--sub);
  border-radius:24px;cursor:pointer;transition:all .2s;white-space:nowrap;
  font-family:var(--font);
}
.nav-pill:hover{color:var(--text);border-color:var(--blue);transform:translateY(-2px);box-shadow:0 3px 10px rgba(59,130,246,.15)}
.nav-pill.on{color:#fff;background:var(--blue);border-color:var(--blue);box-shadow:0 0 16px rgba(59,130,246,.3)}

/* ── Main Content Area ── */
.main{padding:24px;max-width:1140px;margin:0 auto}
.section{margin-bottom:28px}
.section-title{font-size:1.12rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.group-hd{font-size:.95rem;font-weight:700;color:var(--blue);margin:28px 0 14px;padding:8px 0;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px;letter-spacing:.3px}

/* ── Overview: Card Grid ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.18);
  position:relative;overflow:hidden;
}
.card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.card.sig-major::before{background:var(--grad2)}
.card.sig-good::before{background:var(--grad3)}
.card.sig-neutral::before{background:var(--border)}
.card .c-icon{font-size:1.8rem;margin-bottom:10px}
.card .c-name{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.card .c-tag{font-size:.95rem;font-weight:600;margin-bottom:10px}
.card .c-desc{font-size:.88rem;color:var(--sub);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .c-msg{font-size:.78rem;color:var(--sub);margin:4px 0;line-height:1.5}
.card .c-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}

/* ── Code Pills ── */
.c-pill{font-size:.95rem;padding:4px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--sub);font-family:'SF Mono','Fira Code',monospace;cursor:pointer;transition:all .15s}
.c-pill:hover{border-color:var(--blue);color:var(--text);background:var(--card);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.25)}
.c-pill.pick{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.1);font-weight:600}

/* ── Stock Search ── */
.stock-search{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.stock-search input{flex:1;padding:11px 16px;font-size:.9rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.stock-search input:focus{border-color:var(--blue)}
.stock-search button{padding:11px 24px;font-size:.88rem;font-weight:700;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap;transition:all .15s}
.stock-search button:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 3px 10px rgba(59,130,246,.3)}
.stock-result{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;display:none}
.stock-result .sr-row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.stock-result .sr-name{font-size:1.05rem;font-weight:700}
.stock-result .sr-code{font-size:.78rem;color:var(--dim);font-family:'SF Mono','Fira Code',monospace}
.stock-result .sr-price{font-size:1.35rem;font-weight:800}
.stock-result .sr-chg{font-size:.9rem;font-weight:600}
.stock-result .sr-meta{font-size:.72rem;color:var(--sub)}

/* ── News Cards (Briefing) ── */
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;border-left:4px solid var(--blue);transition:all .2s}
.news-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3);border-color:var(--blue)}
.news-card .n-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.news-card .n-rank{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:800;color:#fff;flex-shrink:0}
.news-card .n-rank.r1{background:var(--grad2)}
.news-card .n-rank.r2{background:var(--grad1)}
.news-card .n-rank.r3{background:linear-gradient(135deg,#8b5cf6,#a855f7)}
.news-card .n-rank.r4{background:linear-gradient(135deg,#06b6d4,#3b82f6)}
.news-card .n-rank.r5{background:linear-gradient(135deg,#14b8a6,#06b6d4)}
.news-card .n-rank.r6{background:linear-gradient(135deg,#f59e0b,#f97316)}
.news-card .n-rank.r7{background:linear-gradient(135deg,#ec4899,#f43f5e)}
.news-card .n-rank.r8{background:linear-gradient(135deg,#a855f7,#ec4899)}
.news-card .n-rank.r9{background:linear-gradient(135deg,#6366f1,#a855f7)}
.news-card .n-rank.r10{background:linear-gradient(135deg,#475569,#6366f1)}
.news-card .n-title{font-size:1.1rem;font-weight:700}
.news-card .n-title a{color:var(--text);text-decoration:none}
.news-card .n-title a:hover{color:var(--blue)}
.news-card .n-link{display:inline-block;margin-top:8px;font-size:.74rem;color:var(--blue);text-decoration:none}
.news-card .n-link:hover,.c-msg a:hover,.evt-desc a:hover,.pi-reason a:hover{text-decoration:underline}
.news-card .n-body{font-size:.95rem;color:var(--sub);line-height:1.7;margin-bottom:10px}
.news-card .n-pills{display:flex;flex-wrap:wrap;gap:6px}

/* ── Pick List ── */
.pick-row{display:flex;flex-direction:column;gap:10px}
.pick-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s}
.pick-item:hover{background:var(--card);border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.3)}
.pick-item .pi-rank{font-size:1.3rem;font-weight:800;color:var(--blue);min-width:26px;text-align:center}
.pick-item .pi-info{flex:1;min-width:0}
.pick-item .pi-name{font-size:1rem;font-weight:700}
.pick-item .pi-code{font-size:.84rem;color:var(--dim);margin-left:6px}
.pick-item .pi-reason{font-size:.88rem;color:var(--sub);margin-top:4px}
.pick-item .pi-sector{font-size:.95rem;color:var(--dim);white-space:nowrap}
.pick-item .pi-arrow{font-size:.74rem;color:var(--dim);transition:transform .2s;min-width:16px;text-align:center}
.pick-item.collapsed .pi-reason{display:none}
.pick-item.collapsed .pi-arrow{transform:rotate(-90deg)}

/* ── Chain Map ── */
.chain-card{margin-bottom:12px}
.chain-card summary{font-size:1.05rem;font-weight:700;padding:14px 16px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:space-between;list-style:none;transition:all .2s}
.chain-card summary:hover{background:var(--card);transform:translateY(-2px);border-color:var(--blue);box-shadow:0 3px 10px rgba(0,0,0,.2)}
.chain-card summary::-webkit-details-marker{display:none}
.chain-card summary::after{content:'▸';font-size:1rem;color:var(--sub);transition:transform .2s}
.chain-card[open] summary::after{transform:rotate(90deg)}
.chain-card .chain-body{padding:16px;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);background:var(--card)}
.chain-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:.95rem}
.chain-row .cr-label{font-weight:700;color:var(--sub);min-width:48px;padding-top:2px}
.chain-row .cr-content{color:var(--text)}
.chain-row .cr-content em{font-style:normal;color:var(--blue);font-weight:700}

/* ── Event List ── */
.evt-list{display:flex;flex-direction:column;gap:10px}
.evt-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.95rem;transition:all .2s;cursor:pointer}
.evt-row:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.25);border-color:var(--blue);background:var(--card)}
.evt-date{font-weight:700;min-width:72px;font-size:1.05rem;white-space:nowrap;color:var(--blue)}
.evt-icon{font-size:1.05rem;min-width:24px;text-align:center}
.evt-desc{flex:1;font-size:.95rem}
.evt-sector{font-size:.95rem;color:var(--dim);white-space:nowrap}
.evt-row.big{border-left:4px solid var(--red);background:rgba(239,68,68,.03)}
.evt-row.big .evt-date{color:var(--red)}
.evt-row.past{opacity:.4}
.evt-row.past .evt-date{color:var(--dim)}

/* ── Layout Cards ── */
.layout-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start;transition:all .2s}
.layout-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3);border-color:var(--blue)}
.layout-card.urgent{border-left:4px solid var(--red);background:rgba(239,68,68,.03)}
.layout-card.hot{border-left:4px solid var(--amber)}
.layout-card.warm{border-left:4px solid var(--blue)}
.layout-card.normal{border-left:4px solid var(--border)}
.layout-card.past{opacity:.4;border-left:4px solid var(--dim)}
.layout-card .lc-countdown{min-width:76px;text-align:center}
.layout-card .lc-countdown .lc-days{font-size:1.8rem;font-weight:800}
.layout-card .lc-countdown .lc-label{font-size:.7rem;color:var(--dim)}
.layout-card .lc-info{flex:1;min-width:0}
.layout-card .lc-title{font-size:.95rem;font-weight:700;margin-bottom:4px}
.layout-card .lc-sector{font-size:.74rem;color:var(--dim);margin-bottom:6px}
.layout-card .lc-lead{font-size:.74rem;color:var(--blue);margin-bottom:8px}
.layout-card .lc-stocks{display:flex;flex-wrap:wrap;gap:6px}

/* ── Tables ── */
.tbl-wrap{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);margin-bottom:16px;background:var(--surface)}
.tbl-wrap .tbl-title{font-size:.98rem;font-weight:700;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;list-style:none;display:flex;align-items:center;user-select:none;transition:all .2s}
.tbl-wrap .tbl-title:hover{background:var(--card);color:var(--blue)}
.tbl-wrap .tbl-title::-webkit-details-marker{display:none}
.tbl{width:100%;border-collapse:collapse;font-size:.88rem}
.tbl th{text-align:left;color:var(--dim);font-weight:600;padding:10px 14px;border-bottom:2px solid var(--border);font-size:.82rem;text-transform:uppercase;background:rgba(30,47,74,.15);letter-spacing:.5px}
.tbl th:last-child,.tbl td:last-child{min-width:105px;white-space:nowrap}
.tbl td{padding:10px 14px;border-bottom:1px solid rgba(30,47,74,.4)}
.tbl .code,.tbl .seg,.tbl .pilot{white-space:nowrap}
.tbl tbody tr{cursor:pointer;transition:all .15s}
.tbl tbody tr:hover td{background:rgba(59,130,246,.05)}
.tbl .code{font-family:'SF Mono','Fira Code',monospace;font-size:.84rem;color:var(--dim)}
.tbl .pilot{color:var(--blue);font-size:.86rem;font-weight:600}
.tbl .up{color:var(--green)} .tbl .down{color:var(--red)}

/* ── Recap: Index Chips ── */
.recap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.recap-chip{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center;transition:all .2s}
.recap-chip:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3);border-color:var(--blue)}
.recap-chip .rc-val{font-size:1.8rem;font-weight:800}
.recap-chip .rc-label{font-size:.95rem;color:var(--sub);margin-top:4px}
.recap-chip .rc-sub{font-size:.88rem;color:var(--dim);margin-top:4px}
.recap-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:10px 0}
.recap-bar div{height:100%}
.heat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.heat-tag{padding:5px 14px;border-radius:14px;font-size:.86rem;font-weight:600;transition:all .2s;border:1px solid transparent;background:var(--card)}
.heat-tag:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,.25);border-color:var(--blue)}

/* ── Market Cycle Card ── */
.cycle-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px;border-left:5px solid var(--blue);transition:all .2s}
.cycle-card:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,.35);border-color:var(--blue)}
.cycle-card.risk-low{border-left-color:var(--green)}
.cycle-card.risk-medium{border-left-color:var(--amber)}
.cycle-card.risk-high{border-left-color:var(--red)}
.cycle-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.cycle-phase{font-size:1.15rem;font-weight:800}
.cycle-risk-tag{font-size:.8rem;font-weight:700;padding:4px 12px;border-radius:12px}
.cycle-risk-tag.low{background:rgba(34,197,94,.12);color:var(--green)}
.cycle-risk-tag.medium{background:rgba(245,158,11,.12);color:var(--amber)}
.cycle-risk-tag.high{background:rgba(239,68,68,.12);color:var(--red)}
.cycle-signals{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.cycle-signal{font-size:.86rem;color:var(--sub);padding:3px 0 3px 12px;border-left:2px solid var(--border)}
.cycle-suggestion{font-size:.9rem;font-weight:700;padding:10px 14px;background:rgba(59,130,246,.08);border-radius:var(--radius-sm);color:var(--blue)}

/* ── ZT Ladder ── */
.zt-ladder-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.zt-tier{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:all .2s}
.zt-tier:hover{border-color:var(--blue)}
.zt-tier-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(59,130,246,.04);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:all .2s}
.zt-tier-header:hover{background:rgba(59,130,246,.1);border-color:var(--blue)}
.zt-tier-header .arr{font-size:.74rem;color:var(--sub);transition:transform .2s;margin-left:auto}
.zt-tier.collapsed .zt-tier-body{display:none}
.zt-tier.collapsed .zt-tier-header{border-bottom:none}
.zt-tier.collapsed .zt-tier-header .arr{transform:rotate(-90deg)}
.zt-tier-badge{font-size:.95rem;font-weight:800;padding:4px 12px;border-radius:6px;color:#fff;min-width:60px;text-align:center}
.zt-tier-badge.b6,.zt-tier-badge.b5{background:linear-gradient(135deg,#ef4444,#f97316)}
.zt-tier-badge.b4,.zt-tier-badge.b3{background:linear-gradient(135deg,#f59e0b,#eab308)}
.zt-tier-badge.b2{background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
.zt-tier-badge.b1{background:linear-gradient(135deg,#6366f1,#a855f7)}
.zt-tier-count{font-size:.8rem;color:var(--sub)}
.zt-tier-body{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px}
.zt-stock{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:.8rem;transition:all .2s;cursor:pointer}
.zt-stock:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,.25);background:var(--card)}
.zt-stock .sc{font-family:'SF Mono','Fira Code',monospace;color:var(--dim);font-size:.76rem}
.zt-stock .si{font-size:.7rem;color:var(--sub);margin-left:3px;max-width:64px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.zt-none{text-align:center;color:var(--dim);padding:20px;font-size:.9rem}

/* ── Stock Hover Tooltip ── */
.stock-tip{position:fixed;z-index:9999;background:var(--card);border:1px solid var(--blue);border-radius:var(--radius-sm);padding:12px 14px;font-size:.84rem;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:180px;max-width:260px}
.stock-tip .st-name{font-size:1rem;font-weight:700;margin-bottom:4px}
.stock-tip .st-code{font-size:.76rem;color:var(--dim);font-family:'SF Mono','Fira Code',monospace}
.stock-tip .st-price{font-size:1.2rem;font-weight:700;margin:6px 0}
.stock-tip .st-sector{font-size:.8rem;color:var(--blue);margin-top:2px}
.stock-tip .st-chain{font-size:.74rem;color:var(--sub);margin-top:2px}

/* ── Recap Date Switcher ── */
.recap-date-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.recap-date-bar input[type="date"]{padding:6px 10px;font-size:.82rem;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);transition:border-color .15s}
.recap-date-bar input[type="date"]:focus{border-color:var(--blue);outline:none}
.recap-date-bar input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}
.recap-date-bar .btn-today{padding:6px 14px;font-size:.8rem;font-weight:700;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}
.recap-date-bar .btn-today:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 2px 8px rgba(59,130,246,.3)}
.recap-date-bar .date-status{font-size:.76rem;color:var(--dim)}

/* ── Research / Info Retrieval ── */
.research-box{display:flex;gap:10px;margin-bottom:18px}
.research-box input{flex:1;padding:12px 16px;font-size:.92rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--font);outline:none}
.research-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.research-box button{padding:12px 24px;font-size:.88rem;font-weight:700;background:var(--grad1);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap}
.research-box button:hover{opacity:.92;transform:translateY(-1px)}
.research-hint{font-size:.78rem;color:var(--dim);margin-bottom:14px}

const TABS=['overview','chain','briefing','flash','calendar','layout','stocks','recap','research'];
const TLABEL={overview:'📊 总览',layout:'📋 布局',recap:'📈 复盘',briefing:'📰 简报',flash:'📡 快讯',chain:'🗺️ 产业链',calendar:'📅 事件',stocks:'🎯 标的',research:'📑 检索'};

function go(tab){
  document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('pill-'+tab).classList.add('on');
  document.getElementById('panel-'+tab).classList.add('on');
}

(function build(){
  document.getElementById('navBar').innerHTML=TABS.map((t,i)=>`<div class="nav-pill${i===0?' on':''}" id="pill-${t}" onclick="go('${t}')">${TLABEL[t]}</div>`).join('');

  // Fetch data.json first, merge into D, THEN render all panels
  fetch('./data.json?t='+Date.now()).then(function(r){return r.json()}).then(function(data){
    if(data.recap){
      if(data.recap.index&&data.recap.index.length) D.recap.index=data.recap.index;
      if(data.recap.heat&&data.recap.heat.length) D.recap.heat=data.recap.heat;
      if(data.recap.winners&&data.recap.winners.length) D.recap.winners=data.recap.winners;
      if(data.recap.losers&&data.recap.losers.length) D.recap.losers=data.recap.losers;
      if(data.recap.note) D.recap.note=data.recap.note;
      if(data.recap.flow) D.recap.flow=data.recap.flow;
      if(data.recap.cycle) D.recap.cycle=data.recap.cycle;
      if(data.recap.ztLadder) D.recap.ztLadder=data.recap.ztLadder;
      if(data.concepts){Object.keys(data.concepts).forEach(function(c){if(stockInfo[c])stockInfo[c].concepts=data.concepts[c];});}
    }
    // Dynamic sectors: append new hot sectors found at noon
    if(data.dynamicSectors&&data.dynamicSectors.length){
      D.groups.push({n:'🔥 每日热门 · '+data.dynamicSectors[0].date, sectors:data.dynamicSectors});
      // Enrich stockInfo
      data.dynamicSectors.forEach(function(s){
        s.st.forEach(function(st){stockInfo[st.c]=stockInfo[st.c]||{name:st.n, sector:s.n, pos:'板块成分', tag:s.tag, ind:'新晋热门'};});
      });
    }
    if(data.top3&&data.top3.length) D.top3=data.top3;
    if(data.picks&&data.picks.length) D.picks=data.picks;
    if(data.events&&data.events.length) D.events=data.events;
    if(data.layout&&data.layout.length) D.layout=data.layout;
    if(data.updated) D.updated=data.updated;
    if(data.nextSentinel) D.next=data.nextSentinel;
    if(data.livePrices) D.livePrices=data.livePrices;
    if(data.bHistory&&data.bHistory.length) D.bHistory=data.bHistory;
    // Populate flash news on initial load
    if(data._newsSector || data._newsMarket){
      renderFlashNews(data._newsSector||[], data._newsMarket||[]);
    }
    if(data.sectors){
      var secMap={};
      data.sectors.forEach(function(s){ secMap[s.name]={sig:s.sig,msg:s.msg||'',u:s.u||''}; });
      D.groups.forEach(function(g){
        g.sectors.forEach(function(s){
          for(var k in secMap){
            if(s.n.indexOf(k)>=0||k.indexOf(s.n)>=0){ s.sig=secMap[k].sig; s.msg=secMap[k].msg; s.u=secMap[k].u; break; }
          }
        });
      });
    }
    // Merge dynamic sector tags into sectors for counting + display
    D.sectorTags = data.sectorTags || {};
    if(data.sectorTags){
      D.groups.forEach(function(g){
        g.sectors.forEach(function(s){
          if(data.sectorTags[s.n]){ s.tag = data.sectorTags[s.n]; s.avgChg = parseFloat(s.tag.split('%')[0].replace(/[^0-9.\-+]/g,'')); }
        });
      });
    }
    // Override hardcoded stocks with live sector stocks from EastMoney API
    if(data.sectorStocks){
      D.groups.forEach(function(g){
        g.sectors.forEach(function(s){
          var live = data.sectorStocks[s.n];
          if(live && live.length){
            // Build st array: 科创/创业 first (max 3), then main board, sorted by gain
            var liveArr = [];
            live.forEach(function(st){
              liveArr.push({c: st.c, n: st.n, chg: st.chg});
            });
            // Convert to st format: mark top few as pick
            s.st = liveArr.map(function(item, i){
              return {c: item.c, n: item.n, pick: i < 2 ? 1 : 0};
            });
          }
        });
      });
    }
    renderAll();
  }).catch(function(){ renderAll(); });

  // Helper: compute real countdown days from today to event date (mirrors calendar logic)
  function realDays(ds){
    var today=new Date(); today.setHours(0,0,0,0);
    var m=/(\d+)月(\d+)/.exec(ds);
    if(m) return Math.ceil((new Date(2026,parseInt(m[1])-1,parseInt(m[2]))-today)/86400000);
    if(/上旬/.test(ds)){ var m2=/(\d+)月/.exec(ds); if(m2) return Math.ceil((new Date(2026,parseInt(m2[1])-1,5)-today)/86400000); }
    if(/中旬/.test(ds)){ var m3=/(\d+)月/.exec(ds); if(m3) return Math.ceil((new Date(2026,parseInt(m3[1])-1,15)-today)/86400000); }
    if(/下旬/.test(ds)){ var m4=/(\d+)月/.exec(ds); if(m4) return Math.ceil((new Date(2026,parseInt(m4[1])-1,25)-today)/86400000); }
    return 999;
  }

  // Build stock → info lookup for hover tooltips
  var stockInfo={};
  // Sector → derived industry mapping
  var secInd={'AI芯片':'半导体','CPO/硅光':'光通信','光模块':'光通信','光纤光缆':'通信设备','连接器/铜连接':'电子元器件',
    'PCB/覆铜板':'电子元器件','MLCC电容':'电子元器件','电子树脂/PPE':'化工','电子铜箔':'有色金属',
    'HBM/存储芯片':'半导体','AI服务器/超节点':'计算机设备','液冷散热':'机械设备','交换机/网络':'通信设备',
    '电源/DrMOS':'半导体','数据中心/AIDC':'IT服务','半导体设备':'半导体','光刻胶':'化工',
    '先进封装CoWoS':'半导体','半导体硅片':'半导体','六氟化钨WF₆':'化工','玻璃基板TGV':'电子元器件',
    '培育钻石/散热':'新材料','超导/核聚变':'电力设备','碳纤维':'化工','人形机器人':'机械设备',
    '商业航天':'国防军工','6G/通信':'通信设备','固态电池':'电池','低空经济eVTOL':'航空装备',
    '空间计算/物理AI':'IT服务','钨稀土':'有色金属'};
  D.groups.forEach(function(g){
    g.sectors.forEach(function(s){
      s.st.forEach(function(st){
        var pos=''; if(s.ch.up.indexOf(st.n)>=0) pos='⬆上游'; else if(s.ch.mid.indexOf(st.n)>=0) pos='🔷中游'; else if(s.ch.down.indexOf(st.n)>=0) pos='⬇下游';
        stockInfo[st.c]={name:st.n, sector:s.n, group:g.n.replace(/[^一-鿿]/g,''), pos:pos||'—', tag:s.tag.split('|')[0], ind:secInd[s.n]||s.n};
      });
    });
  });
  // Enrich with ZT ladder industry if available
  if(D.recap.ztLadder&&D.recap.ztLadder.tiers){
    D.recap.ztLadder.tiers.forEach(function(t){
      t.stocks.forEach(function(st){if(stockInfo[st.c]&&st.industry)stockInfo[st.c].ztInd=st.industry;});
    });
  }

  function renderAll(){
    document.getElementById('updateBar').innerHTML=`📡 <b>${D.updated}</b> 更新 | ${D.next} | 交易日每5分钟自动刷新`;
  document.getElementById('navBar').innerHTML=TABS.map((t,i)=>`<div class="nav-pill${i===0?' on':''}" id="pill-${t}" onclick="go('${t}')">${TLABEL[t]}</div>`).join('');

  const allSectors=[];D.groups.forEach(g=>g.sectors.forEach(s=>allSectors.push(s)));
  // Count major from our exact sectors using real stock price averages
  var majorCount=0;
  if(D.sectorTags){Object.keys(D.sectorTags).forEach(function(k){var t=D.sectorTags[k];if(t.indexOf('板均涨')>=0||t.indexOf('板涨')>=0)majorCount++;});}
  if(majorCount===0){majorCount=allSectors.filter(function(s){return s.avgChg>=3;}).length;}
  const goodCount=D.recap.heat?D.recap.heat.filter(h=>parseFloat(h.s)>=0).length:0;
  var marketSummary='';
  (function(){
    var f=D.recap.flow, dt=D.recap.dtCount;
    var pos=0; if(f&&f.length){f.forEach(function(x){if(x.amt.indexOf('+')>=0)pos++;});}
    var flowDir=pos>=Math.ceil((f||[]).length/2)?'净流入':'净流出';
    var ztTotal=D.recap.ztCount!=null?D.recap.ztCount:(D.recap.ztLadder?D.recap.ztLadder.totalCount:0);
    var dtTotal=dt!=null?dt:0;
    if(majorCount>=6&&flowDir==='净流入'&&ztTotal>=50) marketSummary='🔥 强势普涨——重大信号密集，资金涌入，涨停潮延续，可积极布局';
    else if(majorCount>=4&&flowDir==='净流入') marketSummary='📈 偏强格局——热点轮动健康，资金面支持，精选主线标的';
    else if(majorCount>=2&&flowDir==='净流入') marketSummary='⚖️ 温和偏多——局部热点活跃，资金小幅流入，控制仓位参与';
    else if(dtTotal>ztTotal&&dtTotal>20) marketSummary='🔴 恐慌释放——跌停远超涨停，资金出逃，防御为主或空仓等待';
    else if(dtTotal>10) marketSummary='⚠️ 风险加剧——跌停增多，资金流出，减仓观望';
    else if(flowDir==='净流出'&&majorCount<3) marketSummary='📉 弱势震荡——热点稀少，资金流出，严控仓位等待信号';
    else marketSummary='🟡 市场分化——涨跌互现，需精选个股，警惕追高风险';
  })();

  // ════ OVERVIEW ════

  window.doResearch=function(){
    var kw=document.getElementById('researchInput').value.trim();
    if(!kw)return;
    document.getElementById('resResult').style.display='none';
    document.getElementById('resLoading').style.display='block';

    var results={boards:[],stocks:[],news:[],kw:kw};
    var pending=2; // EM boards + Sina news

    // ── Source 1: EastMoney concept board search (JSONP) ──
    var cbName='_emcb_'+Date.now();
    window[cbName]=function(data){
      var items=(data.QuotationCodeTable||{}).Data||data.Datas||[];
      results.boards=items.slice(0,8);
      // Fetch stocks for found boards
      var stockFetch=0, stockDone=0;
      results.boards.forEach(function(b,i){
        var bcode=b.Code||b.code||'';
        if(!bcode.startsWith('BK'))return;
        stockFetch++;
        var url='https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=8&po=1&np=1&fltt=2&invt=2&fid=f3&fs=b:'+bcode+'&fields=f2,f3,f12,f14';
        fetch(url).then(function(r){return r.json()}).then(function(d){
          var stks=d.data.diff||[];
          stks.forEach(function(s){
            results.stocks.push({code:s.f12,name:s.f14,chg:s.f3,board:b.Name||b.name||'',boardCode:bcode});
          });
          stockDone++;
          if(stockDone>=stockFetch&&--pending<=0)showResearch(results);
        }).catch(function(){stockDone++;if(stockDone>=stockFetch&&--pending<=0)showResearch(results);});
      });
      if(stockFetch===0&&--pending<=0)showResearch(results);
      if(--pending<=0)showResearch(results);
      delete window[cbName];
    };
    var sn=document.createElement('script');
    sn.src='https://searchapi.eastmoney.com/api/suggest/get?input='+encodeURIComponent(kw)+'&type=14&count=10&cb='+cbName;
    sn.onerror=function(){delete window[cbName];if(--pending<=0)showResearch(results);};
    document.head.appendChild(sn);
    setTimeout(function(){if(pending>0){pending=0;showResearch(results);}},8000);

    // ── Source 2: Sina keyword news ──
    fetch('https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=2512&k='+encodeURIComponent(kw)+'&num=20&page=1')
      .then(function(r){return r.json()}).then(function(d){
        var items=(d.result||{}).data||[];
        results.news=items.filter(function(it){
          var t=(it.title||it.intro||'').toLowerCase();
          return t.indexOf(kw.toLowerCase())>=0;
        }).map(function(it){return {t:it.title||it.intro||'',u:it.url||'',time:it.ctime||''};});
        if(--pending<=0)showResearch(results);
      }).catch(function(){if(--pending<=0)showResearch(results);});

    // ── Source 3: All-A top gainers filtered by keyword ──
    fetch('http://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=30&po=1&np=1&fltt=2&invt=2&fid=f3&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=f2,f3,f12,f14')
      .then(function(r){return r.json()}).then(function(d){
        var all=d.data.diff||[];
        all.forEach(function(s){
          var n=(s.f14||'').toLowerCase(); var kwl=kw.toLowerCase();
          if(n.indexOf(kwl)>=0)results.stocks.push({code:s.f12,name:s.f14,chg:s.f3,board:'全市场匹配',boardCode:''});
        });
      }).catch(function(){});
  };

  function showResearch(r){
    document.getElementById('resLoading').style.display='none';
    var el=document.getElementById('resResult');el.style.display='block';
    if(!r.boards.length&&!r.stocks.length&&!r.news.length){el.innerHTML='<p style="color:var(--dim)">未找到相关信息，请换个关键词试试。</p>';return;}

    // Dedup stocks by code
    var seen={}; var stocks=[]; r.stocks.forEach(function(s){if(!seen[s.code]){seen[s.code]=1;stocks.push(s);}});
    stocks.sort(function(a,b){return (b.chg||0)-(a.chg||0);});

    var html='';

    if(r.boards.length){

        html+='<span class="res-board" onclick="lookupBoard(\''+code+'\',\''+name+'\')">'+name+'</span>';
      });
      html+='</div>';
    }
    // Stocks (ranked by gain)
    if(stocks.length){
      html+='<div class="res-group"><div class="res-group-title">📈 相关标的（按涨幅排序） <span style="font-size:.76rem;color:var(--dim);font-weight:400">'+stocks.length+'只</span></div>';

        html+='<div class="res-stock-row" onclick="window.open(\'tdxstock://'+s.code+'\',\'_blank\')"><span class="code">'+s.code+'</span><span class="name">'+s.name+'</span><span style="font-size:.72rem;color:var(--dim)">'+boardLabel+'</span><span class="chg" style="color:'+cl+'">'+ar+(s.chg||0).toFixed(1)+'%</span></div>';

      r.news.forEach(function(n){
        var ts='';
        if(n.time){try{var d=new Date(parseInt(n.time)*1000);ts=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}catch(e){}}
        html+='<div class="res-news-item"><span class="rn-time">'+ts+'</span> <span class="rn-title"><a href="'+n.u+'" target="_blank" rel="noopener">'+n.t+'</a></span></div>';
      });
      html+='</div>';
    }
    el.innerHTML=html;
  }

  function searchStock(){
    var input=document.getElementById('stockInput').value.trim();
    var res=document.getElementById('stockResult');
    if(!input){res.style.display='block';document.getElementById('srMeta').textContent='请输入代码或名称';return;}
    // Name search → find code from stockInfo or D groups
    var code='';
    if(input.length===6&&/^\d{6}$/.test(input)){
      code=input;
    }else{
      // Search by name in stockInfo then D.groups
      if(typeof stockInfo!=='undefined'){
        for(var c in stockInfo){if(stockInfo[c].name.indexOf(input)>=0){code=c;break;}}
      }
      if(!code){
        D.groups.forEach(function(g){g.sectors.forEach(function(s){
          s.st.forEach(function(st){if(st.n.indexOf(input)>=0&&!code)code=st.c;});
        });});
      }
      if(!code){
        // Remote search via EastMoney suggest JSONP (CORS-free)
        showResult('','搜索中...',0,0,'全网搜索...');
        var cbName='_emcb_'+Date.now();
        window[cbName]=function(d){
          var items=(d.QuotationCodeTable&&d.QuotationCodeTable.Data)||[];
          if(!items.length){showResult('','—',0,0,'未找到匹配股票');delete window[cbName];return;}
          var item=items[0], fc=item.Code||'', fn=item.Name||'';
          if(!fc||fc.length!==6){showResult('','—',0,0,'未找到匹配股票');delete window[cbName];return;}
          var emcode=(fc.startsWith('6')||fc.startsWith('68'))?'1.'+fc:'0.'+fc;
          fetch('https://push2.eastmoney.com/api/qt/stock/get?secid='+emcode+'&fields=f2,f3,f12,f14')
            .then(function(r){return r.json()}).then(function(d2){
              var s=d2.data; if(!s){showResult(fc,fn,0,0,'无行情');delete window[cbName];return;}
              showResult(fc,fn,s.f2||0,s.f3||0,'✅ 东财实时');
              window.open('tdxstock://'+fc,'_blank');
              delete window[cbName];
            }).catch(function(){showResult(fc,fn,0,0,'行情获取失败');delete window[cbName];});
        };
        var sn=document.createElement('script');
        sn.src='https://searchapi.eastmoney.com/api/suggest/get?input='+encodeURIComponent(input)+'&type=14&count=5&cb='+cbName;
        sn.onerror=function(){if(sn.parentNode)sn.parentNode.removeChild(sn);showResult('','—',0,0,'搜索服务不可用');delete window[cbName];};
        document.head.appendChild(sn);
        return;
      }
    }
    // 1. Local livePrices
    var sina=(code.startsWith('6')||code.startsWith('68'))?'sh'+code:(code.startsWith('0')||code.startsWith('3'))?'sz'+code:'sh'+code;
    if(D.livePrices&&D.livePrices[sina]){
      var lp=D.livePrices[sina];
      showResult(code,lp.name||code,lp.price,lp.chg_pct,'本地实时');
      if(D.livePrices[sina].price)window.open('tdxstock://'+code,'_blank');
      return;
    }
    // 2. EastMoney API
    showResult(code,'查询中...',0,0,'联网查询中...');
    var emcode=(code.startsWith('6')||code.startsWith('68'))?'1.'+code:'0.'+code;
    fetch('https://push2.eastmoney.com/api/qt/stock/get?secid='+emcode+'&fields=f2,f3,f12,f14,f15,f16,f17,f18')
      .then(function(r){return r.json()}).then(function(d){
        var s=d.data; if(!s){showResult(code,'-',0,0,'查无此股');return;}
        var name=s.f14||code, price=s.f2||0, chg=s.f3||0, high=s.f15||0, low=s.f16||0, open=s.f17||0;
        showResult(code,name,price,chg,'实时 | 开'+open.toFixed(2)+' 高'+high.toFixed(2)+' 低'+low.toFixed(2));
        if(D.livePrices)D.livePrices[sina]={price:price,chg_pct:chg,name:name};
        window.open('tdxstock://'+code,'_blank');
      }).catch(function(){showResult(code,'-',0,0,'网络不通,请重试');});
  }

  fetch('./data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
    if(d.updated){document.getElementById('updateBar').innerHTML=`📡 <b>${d.updated}</b> | ${d.nextSentinel||'等待下次扫描'} | 交易日每5分钟自动刷新`;}
  }).catch(()=>{});
})();
</script>
</body>
</html>
