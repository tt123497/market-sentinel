<meta charset="UTF-8">

<title>📡 LIVE · 股市哨兵</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14; --surface:#111827; --card:#171f30;
  --border:#1e2a3f; --hover:#253550;
  --text:#e8ecf2; --sub:#959db3; --dim:#5e6980;
  --blue:#3b82f6; --green:#22c55e; --red:#ef4444;
  --amber:#f59e0b; --purple:#a855f7; --cyan:#06b6d4;
  --pink:#ec4899; --teal:#14b8a6;
  --grad1:linear-gradient(135deg,#3b82f6,#8b5cf6);
  --grad2:linear-gradient(135deg,#f43f5e,#f97316);
  --grad3:linear-gradient(135deg,#22c55e,#14b8a6);
  --radius:14px; --radius-sm:8px;
  --shadow:0 4px 16px rgba(0,0,0,.4);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}

.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(8,12,20,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar .brand{font-size:1.15rem;font-weight:700;letter-spacing:-.3px}
.topbar .brand em{font-style:normal;color:var(--blue)}
.topbar .live{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;padding:4px 12px;border-radius:20px;background:rgba(34,197,94,.12);color:var(--green)}
.topbar .live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.nav{
  position:sticky;top:58px;z-index:99;
  background:rgba(8,12,20,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;gap:6px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.nav-pill{
  flex:0 0 auto;padding:8px 18px;font-size:.78rem;font-weight:500;
  background:var(--surface);border:1px solid var(--border);color:var(--sub);
  border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;
  font-family:var(--font);
}
.nav-pill:hover{color:var(--text);border-color:var(--hover)}
.nav-pill.on{color:#fff;background:var(--blue);border-color:var(--blue)}

.main{padding:16px;max-width:1100px;margin:0 auto}
.section{margin-bottom:18px}
.section-title{font-size:.9rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.group-hd{font-size:.78rem;font-weight:700;color:var(--blue);margin:16px 0 8px;padding:6px 0;border-bottom:1px dashed var(--border);display:flex;align-items:center;gap:6px}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
  cursor:pointer;transition:all .2s;box-shadow:0 1px 2px rgba(0,0,0,.3);
  position:relative;overflow:hidden;
}
.card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.sig-major::before{background:var(--grad2)}
.card.sig-good::before{background:var(--grad3)}
.card.sig-neutral::before{background:var(--border)}
.card .c-icon{font-size:1.5rem;margin-bottom:4px}
.card .c-name{font-size:.85rem;font-weight:600;margin-bottom:2px}
.card .c-tag{font-size:.65rem;font-weight:600;margin-bottom:6px}
.card .c-desc{font-size:.7rem;color:var(--sub);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .c-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.c-pill{font-size:.65rem;padding:3px 8px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--sub);font-family:'SF Mono','Fira Code',monospace}
.c-pill.pick{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.08)}

.news-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;border-left:4px solid var(--blue)}
.news-card .n-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.news-card .n-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;color:#fff;flex-shrink:0}
.news-card .n-rank.r1{background:var(--grad2)}
.news-card .n-rank.r2{background:var(--grad1)}
.news-card .n-rank.r3{background:linear-gradient(135deg,#8b5cf6,#a855f7)}
.news-card .n-title{font-size:.9rem;font-weight:600}
.news-card .n-body{font-size:.75rem;color:var(--sub);line-height:1.6;margin-bottom:8px}
.news-card .n-pills{display:flex;flex-wrap:wrap;gap:5px}

.pick-row{display:flex;flex-direction:column;gap:8px}
.pick-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm)}
.pick-item .pi-rank{font-size:1.1rem;font-weight:800;color:var(--blue);min-width:22px;text-align:center}
.pick-item .pi-info{flex:1;min-width:0}
.pick-item .pi-name{font-size:.8rem;font-weight:600}
.pick-item .pi-code{font-size:.68rem;color:var(--dim);margin-left:4px}
.pick-item .pi-reason{font-size:.7rem;color:var(--sub);margin-top:2px}
.pick-item .pi-sector{font-size:.65rem;color:var(--dim);white-space:nowrap}

.chain-card{margin-bottom:10px}
.chain-card summary{font-size:.85rem;font-weight:600;padding:12px 14px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:space-between;list-style:none}
.chain-card summary::-webkit-details-marker{display:none}
.chain-card summary::after{content:'▸';font-size:.8rem;color:var(--sub);transition:transform .2s}
.chain-card[open] summary::after{transform:rotate(90deg)}
.chain-card .chain-body{padding:14px;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);background:var(--card)}
.chain-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:.75rem}
.chain-row .cr-label{font-weight:600;color:var(--sub);min-width:44px;font-size:.65rem;padding-top:2px}
.chain-row .cr-content{color:var(--text)}
.chain-row .cr-content em{font-style:normal;color:var(--blue);font-weight:600}

.evt-list{display:flex;flex-direction:column;gap:6px}
.evt-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.78rem}
.evt-date{font-weight:700;min-width:70px;font-size:.75rem;white-space:nowrap}
.evt-icon{font-size:1rem;min-width:22px;text-align:center}
.evt-desc{flex:1;font-size:.78rem}
.evt-sector{font-size:.65rem;color:var(--dim);white-space:nowrap}
.evt-row.big{border-left:3px solid var(--red);background:rgba(239,68,68,.04)}

.tbl-wrap{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);margin-bottom:14px}
.tbl-wrap .tbl-title{font-size:.8rem;font-weight:600;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.tbl{width:100%;border-collapse:collapse;font-size:.73rem}
.tbl th{text-align:left;color:var(--sub);font-weight:500;padding:8px 12px;border-bottom:1px solid var(--border);font-size:.65rem;text-transform:uppercase}
.tbl td{padding:8px 12px;border-bottom:1px solid rgba(30,42,63,.5)}
.tbl tbody tr:hover td{background:rgba(59,130,246,.03)}
.tbl .code{font-family:'SF Mono','Fira Code',monospace;font-size:.68rem;color:var(--dim)}
.tbl .pilot{color:var(--blue);font-size:.7rem;font-weight:600}
.tbl .up{color:var(--green)} .tbl .down{color:var(--red)}

/* Market Recap */
.recap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.recap-chip{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center}
.recap-chip .rc-val{font-size:1.6rem;font-weight:800}
.recap-chip .rc-label{font-size:.65rem;color:var(--sub);margin-top:4px}
.recap-chip .rc-sub{font-size:.6rem;color:var(--dim);margin-top:2px}

.recap-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:8px 0}
.recap-bar div{height:100%}

.heat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.heat-tag{padding:4px 12px;border-radius:12px;font-size:.7rem;font-weight:600}

.update-bar{text-align:center;padding:8px;font-size:.68rem;color:var(--sub);background:var(--surface);border-bottom:1px solid var(--border)}
.footer{text-align:center;padding:24px;color:var(--dim);font-size:.65rem;border-top:1px solid var(--border);margin-top:20px;line-height:1.8}
.stat-strip{display:flex;gap:10px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.stat-chip{flex:0 0 auto;min-width:80px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center}
.stat-chip .val{font-size:1.4rem;font-weight:700}
.stat-chip .lbl{font-size:.65rem;color:var(--sub);margin-top:2px}

@media(max-width:600px){
  .topbar{padding:10px 14px}.topbar .brand{font-size:1rem}
  .nav{padding:6px 8px;gap:4px}.nav-pill{padding:7px 14px;font-size:.72rem}
  .main{padding:10px}.card-grid{grid-template-columns:1fr}
  .recap-grid{grid-template-columns:repeat(3,1fr)}
  .stat-chip{min-width:70px;padding:10px}.stat-chip .val{font-size:1.1rem}
}
.tab-panel{display:none}
.tab-panel.on{display:block}
</style>
</head>

}

    st+=`<div class="tbl-wrap"><div class="tbl-title">${s.icon} ${s.n} &nbsp;<span style="font-size:.65rem;color:var(--dim)">${s.ch.up.split('→').pop().split('<')[0].trim()} → ${s.ch.mid.split('→').pop().split('<')[0].trim().replace(/<\/?em>/g,'')}</span></div><table class="tbl"><thead><tr><th>代码</th><th>名称</th><th>位置</th><th>关注</th></tr></thead><tbody>`;
    const allText=s.ch.up+s.ch.mid+s.ch.down;
    s.st.forEach(x=>{let seg='';if(allText.includes(x.n)){seg=s.ch.up.includes(x.n)?'上游':s.ch.mid.includes(x.n)?'中游':'下游';}st+=`<tr><td class="code">${x.c}</td><td>${x.n}</td><td class="seg">${seg||'—'}</td><td class="pilot">${x.pick?'★重点':'—'}</td></tr>`;});
    st+=`</tbody></table></div>`;
  });});
  st+=`</div></div>`;

  document.getElementById('mainContent').innerHTML=ov+rc+br+ch+ca+st;

      function loadLive(){
      // Briefing from cloud
      var bp=document.getElementById('panel-briefing');if(bp){
        fetch('./data.json?t='+Date.now()).then(function(r){return r.json()}).then(function(d){
          if(d.briefing){
            var b=d.briefing;
            var topNewsDiv=bp.querySelector('.section:first-child');
            if(topNewsDiv&&b.top3){
              var newsHtml='<div class="section-title">📰 云端实时简报</div>';
              b.top3.forEach(function(n){
                newsHtml+='<div class="news-card"><div class="n-head"><div class="n-rank r'+n.r+'">'+n.r+'</div><div class="n-title">'+n.t+'</div></div><div class="n-body">'+n.b+'</div><div class="n-pills">'+(n.s||[]).map(function(x){return '<span class="c-pill pick">'+x+'</span>';}).join('')+'</div></div>';
              });
              topNewsDiv.innerHTML=newsHtml;
            }
            var picksDiv=bp.querySelector('.section:last-child');
            if(picksDiv&&b.picks){
              var picksHtml='<div class="section-title">🎯 云端精选标的</div><div class="pick-row">';
              b.picks.forEach(function(p){
                picksHtml+='<div class="pick-item"><div class="pi-rank">#'+p.r+'</div><div class="pi-info"><div><span class="pi-name">'+p.n+'</span><span class="pi-code">'+p.c+'</span></div><div class="pi-reason">'+p.why+'</div></div><div class="pi-sector">'+p.sec+'</div></div>';
              });
              picksHtml+='</div>';
              picksDiv.innerHTML=picksHtml;
            }
          }
        }).catch(function(){});
      }
        fetch('./data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
          if(d.updated){
            var lc=d.runtime?d.runtime.liveCount||49:49;
            document.getElementById('updateBar').innerHTML='☁️ 云端实时 · <b>'+d.updated+'</b> | '+lc+'只标的 | 每15分钟自动刷新 | 电脑关机也能看';
          }
          if(d.livePrices){
            document.querySelectorAll('.tbl tbody tr').forEach(function(tr){
              var td=tr.querySelector('.code');if(!td)return;
              var raw=td.textContent.trim();
              var sina=(raw.startsWith('60')||raw.startsWith('68'))?'sh'+raw:(raw.startsWith('00')||raw.startsWith('30'))?'sz'+raw:'sh'+raw;
              var lp=d.livePrices[sina];if(!lp)return;
              var cl=lp.chg_pct>=0?'var(--green)':'var(--red)';
              var ar=lp.chg_pct>=0?'UP':'DN';
              var pt=tr.querySelector('.lp');
              if(!pt){pt=document.createElement('td');pt.className='lp';pt.style.cssText='font-family:monospace;font-size:.68rem;color:'+cl;tr.appendChild(pt);}
              pt.innerHTML=lp.price.toFixed(lp.price>100?1:2)+' '+ar+Math.abs(lp.chg_pct).toFixed(1)+'%';
            });
            document.querySelectorAll('.tbl thead tr').forEach(function(tr){
              if(!tr.querySelector('.th-lp')){var th=document.createElement('th');th.className='th-lp';th.textContent='PRICE';th.style.fontSize='.65rem';tr.appendChild(th);}
            });
          }
        }).catch(function(){});
      }
      loadLive();setInterval(loadLive,30000);

  // Dynamic data
  fetch('./data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
    if(d.updated){document.getElementById('updateBar').innerHTML=`⏰ 最新哨兵：<b>${d.updated}</b> &nbsp;|&nbsp; 📡 ${d.nextSentinel||'等待下次扫描'}`;}
  }).catch(()=>{});
})();
</script>
