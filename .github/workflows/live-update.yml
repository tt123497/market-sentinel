name: 📡 实时数据更新

on:
  schedule:
    # A股交易时段每15分钟 (CST 9:30-15:00 = UTC 1:30-7:00)
    - cron: '*/15 1-7 * * 1-5'
    # 开盘前一次 (CST 9:15 = UTC 1:15)
    - cron: '15 1 * * 1-5'
    # 收盘后一次 (CST 15:15 = UTC 7:15)
    - cron: '15 7 * * 1-5'
    # 周末也更新一次保持新鲜
    - cron: '0 2 * * 6,0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取实时数据
        run: python .github/scripts/fetch_data.py

      - name: 发现新热门赛道 (盘前/午间/盘后)
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          MIN=$(TZ='Asia/Shanghai' date +%M)
          if { [ "$HOUR" = "09" ] && [ "$MIN" -lt "30" ]; } || { [ "$HOUR" = "12" ] && [ "$MIN" -lt "30" ]; } || { [ "$HOUR" = "15" ] && [ "$MIN" -lt "45" ]; }; then
            python .github/scripts/discover_sectors.py
          else
            echo "Skip discovery (not 9:00-9:30 / 12:00-12:30 / 15:00-15:45)"
          fi

      - name: 提交更新
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinel.local"
          git add data.json
          git diff --staged --quiet || (git commit -m "📊 $(TZ='Asia/Shanghai' date '+%H:%M') 行情更新" && git push)

      - name: 归档收盘数据
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          if [ "$HOUR" = "15" ]; then
            mkdir -p archive
            DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
            cp data.json archive/$DATE.json
            python3 -c "
import json, os
files = sorted([f.replace('.json','') for f in os.listdir('archive') if f.endswith('.json') and f != 'index.json'], reverse=True)
with open('archive/index.json','w') as fh: json.dump(files, fh, ensure_ascii=False)
print(f'Index: {len(files)} archives')
"
            git add archive/
            git diff --staged --quiet || (git commit -m "📦 归档 $DATE 收盘数据" && git push)
          fi
