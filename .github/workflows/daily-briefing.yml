name: 📰 每日简报

on:
  schedule:
    # 早盘后 (CST 10:00 = UTC 2:00)
    - cron: '0 2 * * 1-5'
    # 收盘后 (CST 15:30 = UTC 7:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 生成简报
        run: python .github/scripts/build_briefing.py

      - name: 提交简报
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinel.local"
          git add data.json
          git diff --staged --quiet || (git commit -m "📰 $(TZ='Asia/Shanghai' date '+%H:%M') 简报更新" && git push)
